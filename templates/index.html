<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邱佑晟 | Python</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --bg: #f5f6fa;
            --text: #2d3436;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 300;
        }

        header p {
            color: #636e72;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 2px;
            /* Minimalist sharp edges or slight round */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            text-align: left;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
            border-color: var(--accent);
        }

        .card a {
            text-decoration: none;
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 0.95rem;
            color: #b2bec3;
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.8rem;
            color: #b2bec3;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <header>
        <h1>邱佑晟</h1>
        <p>PYTHON</p>
    </header>

    <div class="container">
        <div class="card-grid">
            <div class="card">
                <a href="/ask.html">01. 中韓字典應用</a>
                <p>簡單直觀的雙語詞彙對照工具。</p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 CHIU YU SHENG. ALL RIGHTS RESERVED.
    </footer>

</body>

</html>
